{% extends "base.html" %}
{% block content %}

<!-- Navbar  -->
<div class="-mx-6 mb-6">
  <header class="w-full bg-indigo-600 shadow-md rounded-md">
    <div class="w-full py-3 px-5 flex items-center justify-between flex-wrap">

      <!-- Context Title -->
      <h2 class="text-lg font-semibold text-white flex items-center gap-2">
        🧩 MIS Form Builder
        <span class="text-xs font-normal text-indigo-200">
          Design dynamic forms
        </span>
      </h2>

      <!-- Relevant Actions -->
      <div class="flex gap-2 flex-wrap">
        <a href="{% url 'dashboard' %}"
           class="px-3 py-1.5 bg-indigo-500 hover:bg-indigo-400
                  text-white text-sm rounded-md transition">
          Dashboard
        </a>

        <a href="{% url 'mis_submission_list' %}"
           class="px-3 py-1.5 bg-white text-indigo-700
                  text-sm font-medium rounded-md shadow">
          All Forms
        </a>
      </div>

    </div>
  </header>
</div>

<!-- Form Card -->
<div class="max-w-3xl mx-auto bg-white shadow-lg rounded-xl p-6">

    <!-- Page Title -->
    <h2 class="text-2xl font-bold text-blue-700 mb-6">
        📝 Create MIS Form
    </h2>

    <form method="post">
        {% csrf_token %}

        <!-- Form Name -->
        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                Form Name
            </label>
            <input type="text" name="form_name"
                   placeholder="Enter form name"
                   class="w-full border border-gray-300 rounded-lg p-3
                          focus:outline-none focus:ring-2 focus:ring-blue-500"
                   required>
        </div>

        <!-- Dynamic Fields Section -->
        <div class="mb-4">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">
                Form Fields
            </h3>

            <div id="fields" class="space-y-3"></div>

            <button type="button"
                    onclick="addField()"
                    class="mt-3 inline-flex items-center gap-2
                           bg-blue-600 hover:bg-blue-700
                           text-white text-sm font-medium
                           px-4 py-2 rounded-lg transition">
                ➕ Add Field
            </button>
        </div>

        <!-- Submit Button -->
        <div class="mt-8 text-right">
            <button type="submit"
                    class="bg-green-600 hover:bg-green-700
                           text-white font-semibold
                           px-6 py-2 rounded-lg shadow transition">
                💾 Save Form
            </button>
        </div>

    </form>
</div>


<script>
function addField() {
    document.getElementById('fields').insertAdjacentHTML('beforeend', `
        <div class="flex gap-3 items-center bg-gray-50 border border-gray-200
                    rounded-lg p-3">

            <input type="text" name="label[]"
                   placeholder="Field Label"
                   class="flex-1 border border-gray-300 rounded-lg p-2
                          focus:outline-none focus:ring-1 focus:ring-blue-500"
                   required>

            <select name="type[]"
                    class="border border-gray-300 rounded-lg p-2
                           focus:outline-none focus:ring-1 focus:ring-blue-500">
                <option value="text">Text</option>
                <option value="number">Number</option>
                <option value="date">Date</option>
            </select>
        </div>
    `);
}
</script>

{% endblock %}
