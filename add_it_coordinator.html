{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-100 p-6 flex justify-center items-center">
  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-lg">
    <h2 class="text-2xl font-bold text-blue-700 mb-6">Add IT Coordinator</h2>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      
      {% for field in form %}
        <div>
          <label class="block font-medium text-gray-700">
            {{ field.label }}
            {% if field.field.required %}
              <span class="text-red-500">*</span>
            {% endif %}
          </label>
          {{ field }}
          
          {% if field.errors %}
            <p class="text-red-600 text-sm">{{ field.errors|striptags }}</p>
          {% endif %}
        </div>
      {% endfor %}
      
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
        Save Coordinator
      </button>
    </form>

    <div class="mt-4">
      <a href="{% url 'dashboard' %}" class="text-blue-600 hover:underline">← Back to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
