{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="max-w-4xl mx-auto mt-6">

  <!-- Header -->
  <div class="bg-gradient-to-r from-red-600 to-pink-600 text-white px-6 py-3 rounded-t-lg shadow">
    <h2 class="text-lg font-semibold">🔄 Return Issued Asset</h2>
  </div>

  <!-- Form Card -->
  <div class="bg-white p-6 rounded-b-lg shadow-md border border-gray-200">

    <form method="POST">
      {% csrf_token %}

      <!-- Asset Details (Read Only) -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">

        <div>
          <label class="block font-medium">Asset Type</label>
          <input type="text" value="{{ issuance.asset_type }}" disabled
                 class="w-full p-2 border rounded-lg bg-gray-100">
        </div>

        <div>
          <label class="block font-medium">Serial Number</label>
          <input type="text" value="{{ issuance.serial_number }}" disabled
                 class="w-full p-2 border rounded-lg bg-gray-100">
        </div>

        <div>
          <label class="block font-medium">Make</label>
          <input type="text" value="{{ issuance.make }}" disabled
                 class="w-full p-2 border rounded-lg bg-gray-100">
        </div>

        <div>
          <label class="block font-medium">Model</label>
          <input type="text" value="{{ issuance.model }}" disabled
                 class="w-full p-2 border rounded-lg bg-gray-100">
        </div>

      </div>

      <!-- Issued To Info -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">

        <div>
          <label class="block font-medium">Issued To</label>
          <input type="text" value="{{ issuance.user_name }}" disabled
                 class="w-full p-2 border rounded-lg bg-gray-100">
        </div>

        <div>
          <label class="block font-medium">Department</label>
          <input type="text" value="{{ issuance.user_department }}" disabled
                 class="w-full p-2 border rounded-lg bg-gray-100">
        </div>

      </div>

      <!-- Return Info -->
      <div class="mb-4">
        <label class="block font-medium">Return Date</label>
        <input type="date" name="return_date" required
               class="w-full p-2 border border-gray-300 rounded-lg">
      </div>

      <div class="mb-4">
        <label class="block font-medium">Return Remarks</label>
        <textarea name="return_remarks" rows="3"
                  class="w-full p-2 border border-gray-300 rounded-lg"
                  placeholder="Condition of asset, remarks..."></textarea>
      </div>

      <!-- Buttons -->
      <div class="flex justify-between mt-6">
        <a href="{% url 'issued_asset_list' %}"
           class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
          ← Cancel
        </a>

        <button type="submit"
                class="px-5 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
          🔄 Confirm Return
        </button>
      </div>

    </form>

  </div>
</div>

{% endblock %}
