{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

  <!-- Login Card -->
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

    <!-- AAI Logo -->
    <div class="flex justify-center mb-6">
      <img
        src="{% static 'images/aai-logo.png' %}"
        alt="Airports Authority of India Logo"
        class="h-28 w-auto object-contain"
      >
    </div>

    <!-- Heading -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800 uppercase tracking-wide">
        AAI IT Dashboard
      </h1>
    </div>

    <!-- ERROR MESSAGES -->
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 flex items-center gap-2 rounded-lg bg-red-100 border border-red-400 px-4 py-3 text-red-800 text-sm">
          <span class="text-lg">⚠️</span>
          <span>{{ message }}</span>
        </div>
      {% endfor %}
    {% endif %}

    <!-- Login Form -->
    <form method="post" class="space-y-4">
      {% csrf_token %}

      <input
        type="text"
        name="username"
        placeholder="Username"
        required
        class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-700 focus:outline-none text-sm"
      >

      <div class="relative">
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Password"
          required
          class="w-full border border-gray-300 rounded-lg p-3 pr-10 focus:ring-2 focus:ring-blue-700 focus:outline-none text-sm"
        >
        <button
          type="button"
          id="togglePassword"
          class="absolute inset-y-0 right-3 flex items-center text-gray-500 hover:text-blue-700"
        >
          👁
        </button>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-3 rounded-lg transition shadow-md"
      >
        Login
      </button>
    </form>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
      © Airports Authority of India
    </p>

  </div>

  <!-- Password Toggle -->
  <script>
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", () => {
      passwordInput.type =
        passwordInput.type === "password" ? "text" : "password";
    });
  </script>

</body>
</html>
