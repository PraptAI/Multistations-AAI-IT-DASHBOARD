{% extends "base.html" %}
{% block content %}

<!-- SECOND NAVBAR  -->

<div class="-mx-6">

<header class="w-full bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 shadow-lg mt-1 mb-3">
    <div class="w-full py-2 px-3 flex items-center justify-between flex wrap">

        <div class="flex items-center space-x-3">
            <span class="text-lg font-semibold text-white">Asset Management</span>
        </div>

    
        <div class="flex items-center space-x-2 flex-wrap">

            <a href="{% url 'add_asset' %}" 
               class="px-3 py-1.5 bg-yellow-400 text-white rounded-md hover:bg-yellow-500 transition font-medium text-sm">
                ➕ Add Asset
            </a>

            <a href="{% url 'new_issuance' %}" 
               class="px-3 py-1.5 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition font-medium text-sm">
                📦 New Issuance
            </a>

            <a href="{% url 'list_assets' %}" 
               class="px-3 py-1.5 bg-green-500 text-white rounded-md hover:bg-green-600 transition font-medium text-sm">
                📋 Asset List
            </a>

        </div>
    </div>
</header>
</div>


<!-- Main Container -->
<div class="max-w-3xl mx-auto px-4">

   
    <div class="bg-white shadow rounded-lg p-4 md:p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Add New Asset</h2>

        <!-- Asset Form -->
        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Two-column grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {% for field in form %}
                <div>
                    <label class="block text-gray-700 font-medium mb-1 text-sm">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="text-red-600 text-xs mt-1">{{ field.errors }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <!-- Submit -->
            <button type="submit" 
                class="mt-4 w-full bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-2 rounded-lg transition text-sm">
                Add Asset
            </button>
        </form>

        <!-- Back -->
        <div class="mt-3 text-right text-sm">
            <a href="{% url 'list_assets' %}" class="text-blue-600 hover:underline font-medium">← Back to Asset List</a>
        </div>
    </div>

</div>

{% endblock %}
